name: dbt CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.10.6" "dbt-snowflake==1.10.2"

      - name: Install dependencies
        run: dbt deps

      - name: Parse project
        run: dbt parse
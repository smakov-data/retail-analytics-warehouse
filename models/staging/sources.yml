version: 2

sources:
  - name: raw
    # позволит испольховать ref = {{ source('raw', 'SALES') }}
    database: ANALYTICS
    schema: RAW
    description: 'Raw source sales data loaded into Snowflake'

    tables:
      - name: SALES
        columns:
          - name: INVOICE
            tests:
              - not_null
          - name: STOCKCODE
            tests:
              - not_null

          - name: QUANTITY
            tests:
              - not_null

          - name: INVOICEDATE
            tests:
              - not_null

          - name: PRICE
            tests:
              - not_null

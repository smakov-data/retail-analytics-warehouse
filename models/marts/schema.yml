version: 2

models:
  ##FCT_ORDER_LINES
  - name: fct_order_lines
    description: > 
      Atomic fact table containing one row per product line in an invoice.
      Grain: one row per product per invoice.
    columns:
      #order_line_key
      - name: order_line_key
        description: Surrogate key for order line grain.
        tests: [not_null, unique]
      
      #invoice_id
      - name: invoice_id
        description: Invoice identifier.
        tests: [not_null]
      
      #stock_code
      - name: stock_code
        description: Product identifier referenced from dim_product.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: stock_code
     
      #order_date
      - name: order_date
        description: Date when the order was created.
        tests:
          - not_null
      
      #date_key
      - name: date_key
        description: Smart date key in YYYYMMDD format referenced from dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

  ##FCT_ORDERS
  - name: fct_orders
    description: >
      Order-level fact table with one row per invoice.
      Grain: one row per invoice.
    columns:
      #invoice_id
      - name: invoice_id
        description: Unique invoice identifier.
        tests: [not_null, unique]
      
      #order_date
      - name: order_date
        description: Date of the order.
        tests:
          - not_null
      
      #date_key
      - name: date_key
        description: Smart date key in YYYYMMDD format referenced from dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      #customer_id
      - name: customer_id
        description: Identifier of the customer placing the order.
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      
      #customer_key
      - name: customer_key
        description: Customer surrogate key referenced from dim_customer.
        tests:
          ##- not_null - качество данных нихкое и могут отсуствовать данные пожтому тест опускаем. - Далее можно модель улучшить и добавить unknow_customer/guest
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key


  ##DIM_PRODUCT
  - name: dim_product
    description: >
      Product dimension containing unique product identifiers and descriptions.
      Grain: one row per product (stock_code).
    columns:
      #stock_code
      - name: stock_code
        description: Unique product identifier.
        tests: [not_null, unique]
      
      #product_description
      - name: product_description
        description: Text description of the product.

  ##DIM_DATE
  - name: dim_date
    description: >
      Date dimension used for time-based analytics.
      Grain: one row per calendar date.
    columns:
      #order_date
      - name: order_date
        description: Calendar date used to join with fact tables.
        tests: [not_null, unique]
      
      #date_key
      - name: date_key
        description: Smart date key in YYYYMMDD format used to join with fact tables.
        tests: [not_null, unique]

  ##DIM_CUSTOMER
  - name: dim_customer
    description: >
      Customer dimension containing unique customer identifiers.
      Grain: one row per customer.
    columns:
      #customer_id
      - name: customer_id
        description: Unique identifier of the customer.
        tests: [not_null, unique]
      
      #customer_key
      - name: customer_key
        description: Customer surrogate key generated from customer_id.
        tests: [not_null, unique]

  ##MART_REVENUE_DAILY
  - name: mart_revenue_daily
    description: >
      Finance mart aggregating daily revenue metrics.
      Grain: one row per order date.
    columns:
      #order_date
      - name: order_date
        description: Calendar date for daily revenue aggregation.
        tests: [not_null, unique]
      
      #date_key
      - name: date_key
        description: Smart date key in YYYYMMDD format referenced from dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

  ##MART_CUSTOMER_METRICS
  - name: mart_customer_metrics
    description: >
      Marketing mart containing aggregated customer-level metrics.
      Grain: one row per customer.
    columns:
      #customer_id
      - name: customer_id
        description: Unique identifier of the customer.
        tests: [not_null, unique]
      
      #customer_key
      - name: customer_key
        description: Customer surrogate key referenced from dim_customer.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

  ##MART_PRODUCT_PERFORMANCE
  - name: mart_product_performance
    description: >
      Product performance mart with aggregated sales and return metrics by SKU.
      Grain: one row per product (stock_code).
    columns:
      #stock_code
      - name: stock_code
        description: Unique product identifier.
        tests: [not_null, unique]